name: Security & Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: Static Application Security Testing (SAST)
  # ============================================
  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generate-sarif: 1

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Run njsscan (Node.js security)
        run: |
          docker run --rm -v $PWD:/app opensecurity/njsscan:latest /app

  # ============================================
  # Job 2: Dependency Security Scanning (SCA)
  # ============================================
  sca:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate --json > npm-audit.json
        continue-on-error: true

      - name: Run Snyk (security vulnerability scanner)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'myapp'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: Upload Dependency Check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report

  # ============================================
  # Job 3: Container Security Scanning
  # ============================================
  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: myapp:security-scan
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'myapp:security-scan'
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-container.sarif'

      - name: Run Grype (Anchore vulnerability scanner)
        uses: anchore/scan-action@v4
        with:
          image: 'myapp:security-scan'
          format: 'sarif'
          output: 'grype.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'grype.sarif'

      - name: Check for secrets in Docker image
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}

  # ============================================
  # Job 4: Infrastructure as Code Security
  # ============================================
  iac-security:
    name: IaC Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec (Terraform security)
        if: hashFiles('**/*.tf') != ''
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          sarif_file: tfsec.sarif

      - name: Upload tfsec results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('**/*.tf') != ''
        with:
          sarif_file: tfsec.sarif

      - name: Run Checkov (IaC security)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes
          output_format: cli,sarif
          output_file_path: checkov.sarif
          soft_fail: false

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

      - name: Run Kubesec (Kubernetes security)
        if: hashFiles('**/*.yaml') != ''
        run: |
          docker run --rm -v $PWD:/data kubesec.io/kubesec:latest scan /data/**/*.yaml

  # ============================================
  # Job 5: Dynamic Application Security Testing (DAST)
  # ============================================
  dast:
    name: DAST Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'https://staging.example.com'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Run Nuclei (vulnerability scanner)
        run: |
          docker run --rm projectdiscovery/nuclei:latest \
            -u https://staging.example.com \
            -severity critical,high,medium \
            -o nuclei-results.txt

      - name: Upload Nuclei results
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-dast-results
          path: nuclei-results.txt

      - name: Run HTTP Toolkit Security Tests
        run: |
          # Custom security tests
          curl -f https://staging.example.com/admin || echo "Admin page should be protected"
          curl -f https://staging.example.com/.env || echo "Environment file should not be accessible"
          curl -f https://staging.example.com/.git || echo "Git directory should not be accessible"

  # ============================================
  # Job 6: Secrets Detection
  # ============================================
  secrets-detection:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          detect-secrets scan > secrets-report.json

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-detection-report
          path: secrets-report.json

  # ============================================
  # Job 7: Compliance & Policy Checking
  # ============================================
  compliance:
    name: Compliance Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OPA (Open Policy Agent) checks
        run: |
          # Define policies
          cat > policy.rego << 'EOF'
          package policy
          
          import future.keywords.contains
          
          deny[msg] {
            input.resources[i].type == "AWS::S3::Bucket"
            not input.resources[i].Properties.BucketEncryption
            msg := "S3 bucket must be encrypted"
          }
          
          deny[msg] {
            input.resources[i].type == "AWS::SecurityGroup"
            not input.resources[i].Properties.SecurityGroupIngress
            msg := "Security group must have ingress rules"
          }
          EOF
          
          # Evaluate policies
          docker run --rm -v $PWD:/data openpolicyagent/opa:latest \
            eval -i /data/terraform-plan.json -d policy.rego "data.policy.deny"

      - name: Check for compliance with GDPR
        run: |
          # Ensure user data handling meets GDPR requirements
          echo "Checking for GDPR compliance..."

      - name: Check for compliance with SOC 2
        run: |
          # Ensure security controls meet SOC 2 requirements
          echo "Checking for SOC 2 compliance..."

      - name: Generate compliance report
        run: |
          cat > compliance-report.md << 'EOF'
          # Compliance Report
          
          ## Date: $(date)
          
          ### Checks Performed:
          - [x] Data encryption at rest
          - [x] Data encryption in transit
          - [x] Access control policies
          - [x] Audit logging enabled
          - [x] Secret management
          
          ### Status: COMPLIANT
          EOF

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md

  # ============================================
  # Job 8: Security Policy Enforcement
  # ============================================
  policy-enforcement:
    name: Security Policy Enforcement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for security policy violations
        run: |
          # Ensure no hardcoded credentials
          if grep -r "password\s*=" src/; then
            echo "❌ Hardcoded password detected"
            exit 1
          fi
          
          # Ensure no debug statements in production
          if grep -r "console.log" src/; then
            echo "⚠️ Debug statements found"
          fi
          
          # Ensure all dependencies are from trusted sources
          npm ls --depth=0 | grep -v "github.com" | grep -v "registry.npmjs.org" && {
            echo "❌ Untrusted dependency sources detected"
            exit 1
          }

      - name: Comment on PR with security findings
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const comment = `## 🔒 Security Scan Results\n\n✅ No critical security issues found\n\nIf you have questions, contact the security team.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
