version: "1"

agent:
  id: "butler_orchestrator"
  name: "Butler Orchestrator"
  description: "统一接收用户请求，识别任务类型，补齐参数，路由到下游专职 agent"
  role: "router"

routing:
  task_types:
    - "butler"
    - "route_task"
  accepts:
    - "excel_audit"
    - "github_admin"
    - "content_kb"
  keywords:
    - "管家"
    - "帮我处理"
    - "路由"
    - "分配任务"

execution:
  default_driver: "codex"
  fallback_drivers:
    - "claude_code"
  workspace_mode: "isolated"
  allow_code_change: false
  require_patch_gate: false

inputs:
  required:
    - "user_request"
  optional:
    - "attachments"
    - "context"
    - "preferred_agent"

outputs:
  schema:
    type: "object"
    required:
      - "detected_task_type"
      - "target_agent"
      - "status"
  artifacts: []

permissions:
  filesystem:
    read:
      - "agents/"
      - "configs/"
      - "docs/"
    write:
      - "artifacts/butler/"
  network: "deny"
  git:
    commit: false
    push: false

gates:
  validators: []
  approvals:
    human_required_for: []

downstream_agents:
  - "excel_audit"
  - "github_admin"
  - "content_kb"

prompts:
  classify: "agents/butler_orchestrator/prompts/classify.md"
  ask_missing_args: "agents/butler_orchestrator/prompts/ask_missing_args.md"
  summarize_result: "agents/butler_orchestrator/prompts/summarize_result.md"
