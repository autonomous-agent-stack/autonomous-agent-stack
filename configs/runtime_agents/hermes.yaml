{
  "id": "hermes",
  "kind": "runtime",
  "service": "autoresearch.core.services.hermes_runtime_adapter:HermesRuntimeAdapterService",
  "version": "1.0",
  "capabilities": [
    "create_session",
    "run",
    "stream",
    "cancel",
    "status"
  ],
  "aep_bridge": {
    "jobspec_inputs": [
      "run_id",
      "agent_id",
      "task",
      "mode",
      "policy.timeout_sec",
      "metadata.hermes",
      "input_artifacts"
    ],
    "result_fields": [
      "status",
      "summary",
      "stdout_preview",
      "stderr_preview",
      "returncode",
      "changed_paths",
      "output_artifacts",
      "metrics",
      "recommended_action",
      "error"
    ],
    "workspace_binding": "JobSpec.metadata.hermes.work_dir -> RuntimeRunRequest.work_dir -> RuntimeRunRead.work_dir",
    "artifact_bindings": [
      "RuntimeRunRead.stdout_preview -> log artifact",
      "RuntimeRunRead.stderr_preview -> log artifact",
      "RuntimeStatusRead.latest_events / RuntimeStreamEvent -> session event log artifact"
    ]
  },
  "metadata": {
    "lane": "runtime_adapter_v1",
    "implementation": "adapter-sandwich",
    "fallback_metadata_namespace": "openclaw"
  }
}
