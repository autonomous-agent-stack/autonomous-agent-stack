{
  "id": "yt-dlp",
  "kind": "process",
  "entrypoint": "drivers/yt-dlp_adapter.sh",
  "version": "0.1",
  "capabilities": [
    "download_video",
    "download_audio",
    "download_subtitles",
    "extract_metadata",
    "network_access"
  ],
  "default_mode": "apply_in_workspace",
  "policy_defaults": {
    "timeout_sec": 1800,
    "max_steps": 1,
    "network": "allowlist",
    "network_allowlist": [
      "https://www.youtube.com/*",
      "https://youtube.com/*",
      "https://youtu.be/*",
      "https://www.youtu.be/*",
      "https://vimeo.com/*",
      "https://www.vimeo.com/*",
      "https://twitter.com/*",
      "https://x.com/*",
      "https://www.twitch.tv/*",
      "https://twitch.tv/*",
      "https://www.bilibili.com/*",
      "https://bilibili.com/*"
    ],
    "tool_allowlist": ["read", "write", "bash", "network"],
    "allowed_paths": ["downloads/**", "artifacts/**", ".masfactory_runtime/**"],
    "forbidden_paths": [
      ".git/**",
      "logs/**",
      "src/**",
      "tests/**",
      "memory/**",
      "**/*.key",
      "**/*.pem",
      "**/.env*"
    ],
    "max_changed_files": 50,
    "max_patch_lines": 0,
    "allow_binary_changes": true,
    "cleanup_on_success": false,
    "retain_workspace_on_failure": true
  },
  "metadata": {
    "runtime_host_preference": "linux",
    "execution_role": "primary",
    "risk_profile": "medium",
    "description": "Video/audio downloader using yt-dlp",
    "supported_sites": [
      "youtube.com",
      "youtu.be",
      "vimeo.com",
      "twitter.com",
      "x.com",
      "twitch.tv",
      "bilibili.com"
    ],
    "defaults": {
      "write_subs": true,
      "sub_langs": "zh-Hans,zh-Hant,en",
      "skip_download": true,
      "force": false
    }
  }
}
