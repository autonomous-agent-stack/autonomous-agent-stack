{
  "id": "mock",
  "kind": "process",
  "entrypoint": "drivers/mock_adapter.sh",
  "version": "0.1",
  "capabilities": [
    "write_repo",
    "produce_patchable_changes"
  ],
  "default_mode": "apply_in_workspace",
  "policy_defaults": {
    "timeout_sec": 60,
    "max_steps": 1,
    "network": "disabled",
    "network_allowlist": [],
    "tool_allowlist": ["read", "write", "bash"],
    "allowed_paths": ["src/**", "tests/**", "scripts/**", "docs/**"],
    "forbidden_paths": [
      ".git/**",
      "logs/**",
      ".masfactory_runtime/**",
      "memory/**"
    ],
    "max_changed_files": 5,
    "max_patch_lines": 200,
    "allow_binary_changes": false,
    "cleanup_on_success": true,
    "retain_workspace_on_failure": true
  }
}
