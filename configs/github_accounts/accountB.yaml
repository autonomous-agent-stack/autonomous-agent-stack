profile_id: "github_accountB"
description: "GitHub account B execution profile"

auth:
  token_env: "GITHUB_TOKEN_ACCOUNT_B"
  fallback_token_env: "GITHUB_TOKEN"

defaults:
  base_branch: "main"
  allowed_owners: []
  allowed_repos: []
  dry_run_default: false

safety:
  require_explicit_repo: true
  block_force_push: true
  block_delete_branch: true
