[pytest]
# Pytest Configuration File

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests/test-cases

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    llm: LLM-related tests
    rag: RAG-related tests
    agent: Agent-related tests
    slow: Tests that take longer to run
    integration: Integration tests
    unit: Unit tests

# Coverage options (if using pytest-cov)
[coverage:run]
source = tests/test-cases
omit = 
    */fixtures.py
    */runner.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
