services:
  ai-lab:
    build: .
    platform: linux/arm64
    container_name: ai-lab
    working_dir: /workspace
    # 强制以 root 运行，确保能抡得动 gh 和 git 这类重型扳手
    user: "root"
    volumes:
      - ../..:/workspace:ro
      - ../../logs:/workspace/logs:rw
      - ${WORKSPACE_DIR}/worktrees:/opt/worktrees:rw
      - ${CACHE_DIR}:/root/.cache:rw
      - ${OPENHANDS_HOME_DIR:-${LOG_DIR}/openhands-home}:/root/.openhands:rw
      - ${DOCKER_HOST_SOCKET_DIR:-/var/run}:${DOCKER_HOST_MOUNT_DIR:-/var/run/host-docker}:rw
    tmpfs:
      - /tmp:size=2g,mode=1777
    environment:
      - DOCKER_HOST=${DOCKER_HOST_IN_CONTAINER:-unix:///var/run/host-docker/docker.sock}
      - HOME=/root
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - GITHUB_TOKEN
      - LLM_API_KEY
      - LLM_MODEL
      - LLM_BASE_URL
    restart: "no"
