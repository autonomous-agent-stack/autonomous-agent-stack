services:
  ai-lab:
    build: .
    platform: linux/arm64
    container_name: ai-lab
    working_dir: /workspace
    # 强制以 root 运行，确保能抡得动 gh 和 git 这类重型扳手
    user: "root"
    volumes:
      - ../..:/workspace:rw
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - GITHUB_TOKEN
    restart: "no"
