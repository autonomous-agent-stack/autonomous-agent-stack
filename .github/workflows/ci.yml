name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:

jobs:
  lint-test-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi
          pip install ruff black pip-audit

      - name: Ruff Smoke
        run: |
          ruff check \
            scripts/doctor.py \
            scripts/test_registry.py \
            src/bridge/api.py \
            src/integrations/google_workspace/calendar.py \
            src/integrations/google_workspace/tasks.py \
            src/integrations/google_workspace/drive.py \
            src/integrations/google_workspace/oauth.py \
            tests/test_gateway_telegram.py \
            tests/skills/test_github_analyzer_skill.py

      - name: Black Smoke
        run: |
          black --check \
            scripts/doctor.py \
            scripts/test_registry.py \
            src/bridge/api.py \
            src/integrations/google_workspace/calendar.py \
            src/integrations/google_workspace/tasks.py \
            src/integrations/google_workspace/drive.py \
            src/integrations/google_workspace/oauth.py \
            tests/test_gateway_telegram.py \
            tests/skills/test_github_analyzer_skill.py

      - name: Pytest Smoke
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/test_gateway_telegram.py \
            tests/skills/test_github_analyzer_skill.py

      - name: Pip Audit
        run: |
          if [ -f requirements.lock ]; then
            pip-audit -r requirements.lock --disable-pip --no-deps
          else
            pip-audit -r requirements.txt --disable-pip --no-deps
          fi
