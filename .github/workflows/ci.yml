name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:
  merge_group:

jobs:
  lint-test-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi
          pip install ruff black pip-audit

      - name: Ruff
        run: |
          ruff check \
            src/autoresearch/agent_protocol \
            src/autoresearch/executions/runner.py \
            scripts/agent_run.py \
            scripts/ci/check_pr_bilingual.py \
            tests/test_agent_protocol_models.py \
            tests/test_agent_policy_merge.py \
            tests/test_agent_runner_patch_filter.py \
            tests/test_agent_fallbacks.py \
            tests/test_openhands_controlled_backend.py \
            tests/test_check_pr_bilingual.py

      - name: Black
        run: |
          black --check \
            src/autoresearch/agent_protocol \
            src/autoresearch/executions/runner.py \
            scripts/agent_run.py \
            scripts/ci/check_pr_bilingual.py \
            tests/test_agent_protocol_models.py \
            tests/test_agent_policy_merge.py \
            tests/test_agent_runner_patch_filter.py \
            tests/test_agent_fallbacks.py \
            tests/test_openhands_controlled_backend.py \
            tests/test_check_pr_bilingual.py

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/test_agent_protocol_models.py \
            tests/test_agent_policy_merge.py \
            tests/test_agent_runner_patch_filter.py \
            tests/test_agent_fallbacks.py \
            tests/test_openhands_controlled_backend.py \
            tests/test_check_pr_bilingual.py

      - name: Pip Audit
        # Temporary exception: no patched Pygments release published yet.
        run: pip-audit --ignore-vuln CVE-2026-4539

  windows-main-chain:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup virtualenv via setup.cmd
        shell: cmd
        run: setup.cmd

      - name: Run doctor via doctor.cmd
        shell: cmd
        run: doctor.cmd --port 8001

      - name: Focused Windows regression tests
        shell: powershell
        run: |
          .\.venv\Scripts\python.exe -m pytest `
            tests/test_local_dev.py `
            tests/test_excel_ops_router.py `
            tests/test_excel_ops_service.py `
            tests/test_worker_schedules.py -q

      - name: Start API and verify Windows main chain
        shell: powershell
        run: |
          $proc = Start-Process -FilePath ".\.venv\Scripts\python.exe" `
            -ArgumentList "scripts\local_dev.py","--venv",".venv","start","--host","127.0.0.1","--port","8001" `
            -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8001/health" -TimeoutSec 5
                if ($health.status -eq "ok") {
                  $ready = $true
                  break
                }
              } catch {
                if ($proc.HasExited) {
                  break
                }
              }
            }

            if (-not $ready) {
              if ($proc.HasExited) {
                throw "Windows main chain exited early with code $($proc.ExitCode)."
              }
              throw "Windows main chain did not become healthy on http://127.0.0.1:8001/health."
            }

            $req4 = Invoke-RestMethod -Uri "http://127.0.0.1:8001/api/v1/excel-ops/status/requirement4" -TimeoutSec 5
            if ($req4.router_registered -ne $true -or $req4.router_wired -ne $true) {
              throw "requirement-4 router did not report router_registered=true and router_wired=true."
            }
            if ($req4.ready_for_business_assets -ne $false) {
              throw "requirement-4 unexpectedly reported ready_for_business_assets=true without real assets."
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
              $proc.WaitForExit()
            }
          }
