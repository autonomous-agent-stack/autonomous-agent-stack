name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:
  merge_group:

env:
  PYTHON_BASELINE: "3.11"
  CORE_LINT_PATHS: >-
    src/autoresearch/agent_protocol
    src/autoresearch/api/routers
    src/autoresearch/executions/runner.py
    src/autoresearch/shared/task_contract.py
    src/autoresearch/shared/worker_contract.py
    src/autoresearch/shared/run_contract.py
    src/autoresearch/shared/task_gate_contract.py
    src/gateway
    src/gatekeeper
    scripts/agent_run.py
    tests/gateway/test_message_mirror.py
    tests/test_agent_protocol_models.py
    tests/test_agent_policy_merge.py
    tests/test_agent_runner_patch_filter.py
    tests/test_agent_fallbacks.py
    tests/test_approvals_api.py
    tests/test_capability_api.py
    tests/test_gatekeeper_e2e.py
    tests/test_openclaw_compat.py
    tests/test_openhands_controlled_backend.py
    tests/test_task_contract.py
    tests/test_worker_contract.py
    tests/test_run_contract.py
    tests/test_task_gate_contract.py
  CORE_TEST_PATHS: >-
    tests/gateway/test_message_mirror.py
    tests/test_agent_protocol_models.py
    tests/test_agent_policy_merge.py
    tests/test_agent_runner_patch_filter.py
    tests/test_agent_fallbacks.py
    tests/test_approvals_api.py
    tests/test_capability_api.py
    tests/test_gatekeeper_e2e.py
    tests/test_openclaw_compat.py
    tests/test_openhands_controlled_backend.py
    tests/test_task_contract.py
    tests/test_worker_contract.py
    tests/test_run_contract.py
    tests/test_task_gate_contract.py

jobs:
  lint-test-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python support policy
        run: |
          echo "Project baseline: Python ${PYTHON_BASELINE}+"
          echo "CI verification matrix: 3.11, 3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi
          pip install ruff black pip-audit

      - name: Ruff
        run: |
          ruff check ${CORE_LINT_PATHS}

      - name: Black
        run: |
          black --check ${CORE_LINT_PATHS}

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          pytest -q ${CORE_TEST_PATHS}

      - name: Pip Audit
        # Suppress known CVEs in transitive dependencies without patched releases in our dependency chain.
        run: >
          pip-audit
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-28802
          --ignore-vuln CVE-2026-27962
          --ignore-vuln CVE-2026-28490
          --ignore-vuln CVE-2026-26007
          --ignore-vuln CVE-2026-34073
          --ignore-vuln CVE-2025-69872
          --ignore-vuln CVE-2025-14546
          --ignore-vuln CVE-2026-22701
          --ignore-vuln CVE-2026-27205
          --ignore-vuln CVE-2025-53000
          --ignore-vuln CVE-2025-67221
          --ignore-vuln CVE-2026-25990
          --ignore-vuln CVE-2025-8869
          --ignore-vuln CVE-2026-1703
          --ignore-vuln CVE-2026-0994
          --ignore-vuln CVE-2026-30922
          --ignore-vuln CVE-2026-32597
          --ignore-vuln CVE-2026-24486
          --ignore-vuln CVE-2026-25645
          --ignore-vuln GHSA-78cv-mqj4-43f7
          --ignore-vuln CVE-2026-31958
          --ignore-vuln CVE-2025-66418
          --ignore-vuln CVE-2025-66471
          --ignore-vuln CVE-2026-21441
          --ignore-vuln CVE-2026-21860
          --ignore-vuln CVE-2026-27199
          --ignore-vuln CVE-2026-24049
          --ignore-vuln CVE-2026-26331
