name: Quality Gates

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  reviewer-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi
          pip install -r requirements-review.lock

      - name: Mypy (reviewer core modules)
        run: |
          mypy --config-file mypy.ini \
            src/gatekeeper/static_analyzer.py \
            src/gatekeeper/business_enforcer.py \
            src/gatekeeper/llm_reviewer.py \
            src/gatekeeper/board_summarizer.py

      - name: Bandit (reviewer core modules)
        run: |
          bandit -q \
            src/gatekeeper/static_analyzer.py \
            src/gatekeeper/business_enforcer.py \
            src/gatekeeper/llm_reviewer.py \
            src/gatekeeper/board_summarizer.py

      - name: Semgrep (reviewer core modules)
        run: |
          semgrep --error --config=p/python \
            src/gatekeeper/static_analyzer.py \
            src/gatekeeper/business_enforcer.py \
            src/gatekeeper/llm_reviewer.py \
            src/gatekeeper/board_summarizer.py
